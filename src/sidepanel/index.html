<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <title data-i18n="extensionName">PromptMaster</title>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <div class="title">
    <picture>
      <source media="(prefers-color-scheme: dark)" srcset="../icons/icon-main-s.png">
      <img class="header-icon" src="../icons/icon-main-s color.png" alt="Extension Icon"
        style="width: 22px; height: 22px" />
    </picture>
    <h2 data-i18n="extensionName"></h2>
    <a href="index.html" target="_blank">
      <img id="open-new-tab" class="header-icon" src="../icons/open_in_new.svg" alt="Open in New Tab"
        title="Open in New Tab" />
    </a>
  </div>
  <form id="prompt-form">
    <input type="hidden" id="prompt-index" />
    <input type="text" id="prompt-title" data-i18n-placeholder="promptTitle" required />
    <textarea id="prompt-content" data-i18n-placeholder="promptContent" required style="height: 100%"></textarea>
    <!-- 标签输入区域 -->
    <div id="tags-container" class="tags-container">
      <div id="tags-display" class="tags-display"></div>
      <div class="tag-input-wrapper">
        <input type="text" id="tag-input" data-i18n-placeholder="tagInputPlaceholder" />
      </div>
    </div>
    <div class="form-buttons">
      <button type="button" id="cancel-edit-button" style="display: none" data-i18n="cancel">
      </button>
      <button class="main" type="submit" id="submit-button">
        <img src="../icons/add-icon.png" data-i18n-alt="add" style="margin-right: 5px" />
        <span data-i18n="savePrompt"></span>
      </button>
    </div>
  </form>
  <div id="info-banner" class="info-banner" role="status" aria-live="polite">
    <button id="info-banner-close" class="info-banner-close" aria-label="Dismiss info banner">&times;</button>
    <h3 class="info-banner-title" data-i18n="newVersionNewFeatures"></h3>
    <br />
    <p class="info-banner-text" data-i18n="hello"></p>
    <br />
    <p class="info-banner-text" data-i18n="v2Released"></p>
    <ul class="info-banner-list">
      <li data-i18n="support19LLMs"></li>
      <li data-i18n="newLLMPermissionManager"></li>
      <li data-i18n="responsiveSidebar"></li>
      <li data-i18n="copyPaste"></li>
      <li data-i18n="appendPromptSetting"></li>
      <li data-i18n="betterThanEver"></li>
    </ul>
    <br />
    <p class="info-banner-text"><span data-i18n="permissionManagement"></span><strong><a href="../permissions/permissions.html"
          target="_blank" data-i18n="lockIcon"></a></strong><span data-i18n="permissionManagementEnd"></span></p>
    <br />
    <p class="info-banner-text"><span data-i18n="thankYou"></span><strong data-i18n="thanks"></strong>。</p>
    <br />
    <p class="info-banner-text"><span data-i18n="leaveReview"></span><a
        href="https://microsoftedge.microsoft.com/addons/detail/promptmaster/decdbjbmghcogkbpjpfknillkabahdni"
        target="_blank" data-i18n="promptMasterLink"></a><span data-i18n="leaveReviewEnd"></span></p>
    <br />
    <p class="info-banner-text" data-i18n="thanksAgain"></p>
  </div>
  <div class="prompts-container">
    <div class="prompts-section">
      <input type="text" id="prompt-search" data-i18n-placeholder="searchPlaceholder" />
      <!-- COMMENT: Empty state when no LLM provider permissions are enabled -->
      <div id="permissions-shortcut" class="shortcut-container" style="display: none">
        <p style="margin: 8px 0" data-i18n="addAIAssistants"></p>
      </div>
      <ul id="prompt-list">

      </ul>
      <!-- Add title and message about storage changes -->
      <div id="empty-state" class="shortcut-container" style="display: none">
        <h3 data-i18n="keyboardNavigation"></h3>
        <p data-i18n="shortcutsAvailable"></p>
        <p style="display: flex; align-items: center; margin: 8px 0"> <span style="
                background-color: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                margin-right: 10px;
              " data-i18n="hoverClick">
            </span> <span data-i18n="openPromptList"></span> </p>
        <p style="display: flex; align-items: center; margin: 8px 0"> <span style="
                background-color: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                margin-right: 10px;
              ">
            ⌘ + ⇧ + P / Ctrl + M </span> <span data-i18n="openClosePromptList"></span> </p>
        <p style="display: flex; align-items: center; margin: 8px 0"> <span style="
                background-color: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                margin-right: 10px;
              ">↑↓</span> <span data-i18n="navigatePromptList"></span> </p>
        <p style="display: flex; align-items: center; margin: 8px 0"> <span style="
                background-color: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                margin-right: 10px;
              ">Enter</span> <span data-i18n="selectPrompt"></span> </p>
        <p style="display: flex; align-items: center; margin: 8px 0"> <span style="
                background-color: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                margin-right: 10px;
              ">Esc</span> <span data-i18n="closePromptMaster"></span> </p>
      </div>
    </div>
  </div>
  <!-- COMMENT: LLMs section shows activated and available providers, mirroring the permissions page behavior -->
  <div id="llms-section" class="llms-section">
    <h3 class="llms-heading" data-i18n="aiAssistant"></h3>
    <p></p>
    <div class="llms-group">
      <div id="llms-activated" class="llms-pills" aria-live="polite">
        <!-- COMMENT: Active provider pills rendered here -->
      </div>
    </div>
    <div class="llms-group">
      <!-- COMMENT: Available section is foldable; collapsed by default -->
      <div class="llms-subheading" id="llms-available-toggle" role="button" tabindex="0" aria-controls="llms-available"
        aria-expanded="false" data-i18n="addMore"></div>
      <div id="llms-available" class="llms-pills collapsible" aria-live="polite">
        <!-- COMMENT: Available provider pills rendered here (click to request permission) -->
      </div>
    </div>
  </div>
  <!-- COMMENT: Prompt Management section with fold/unfold, folded by default -->
  <div id="pm-section" class="llms-section">
    <h3 class="llms-heading" id="pm-toggle" role="button" tabindex="0" aria-controls="pm-controls"
      aria-expanded="false" data-i18n="settings"></h3>
    <div class="llms-group">
      <div id="pm-controls" class="pm-controls collapsible" aria-live="polite">
        <div class="pm-subtitle" data-i18n="managePrompts"></div>
        <div class="pm-row">
          <button class="main" id="export-btn" data-i18n="export"></button>
          <button class="main" id="import-btn" data-i18n="import"></button>
        </div>
        <input type="file" id="import-file" accept=".json" hidden />
        <div class="pm-subtitle" data-i18n="otherSettings"></div>
      </div>
    </div>
  </div>
  <p></p>
  <!-- Sticky footer for icons/links -->
  <footer class="footer">
    <div class="footer-icons" style="display: flex; align-items: center; gap: 8px;">
      <a id="link" href="https://gitee.com/ye_sheng0839/prompt-master" target="_blank" data-i18n-title="gitee"><img
          class="footer-icons footer-icon-original" src="../icons/gitee.svg" alt="Gitee" /></a>
      <!-- COMMENT: Buy Me a Coffee link inserted between Gitee and Chrome Web Store -->
      <a id="link" href="https://buymeacoffee.com/jonathanbertholet" target="_blank" data-i18n-title="buyMeACoffee">
        <span style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3674B5;
          ">
          <img class="footer-icons footer-icon-original" src="../icons/coffee.svg" data-i18n-alt="buyMeACoffee"
            style="width: 12px; height: 12px; filter: brightness(0) invert(1);" />
        </span>
      </a>
      <a id="link" href="https://gitee.com/ye_sheng0839/prompt-master/issues" target="_blank" data-i18n-title="leaveFeedback"><img
          class="footer-icons footer-icon-original" src="../icons/review-icon.png" data-i18n-alt="leaveFeedback" /></a>
      <a id="link" href="../settings.html" title="Settings"><img id="settings-icon" class="footer-icons"
          src="../icons/settings-icon.png" alt="Settings" /></a>
      <a id="link" href="../permissions/permissions.html" title="Get Started" target="_blank"
        style="text-decoration: none;">
        <span style="
          display: inline-flex;
          align-items: center;
          background-color: var(--primary, #3674B5);
          color: #fff;
          padding: 4px 14px;
          border-radius: 999px;
          font-size: 13px;
          font-weight: 500;
          gap: 7px;
          box-shadow: 0 1px 2px rgba(0,0,0,0.04);
          transition: background 0.15s;
        " data-i18n="start">
        </span>
      </a>
    </div>
  </footer>
  <script type="module" src="sidepanel.js"></script>

</body>

</html>
