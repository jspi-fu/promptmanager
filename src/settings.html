<!DOCTYPE html>
<html>

<head>
  <title>信息</title>
  <!-- Link to the main stylesheet for consistent styling -->
  <link rel="stylesheet" href="sidepanel/styles.css">
  <meta charset="UTF-8">
</head>

<body>
  <div class="title">
    <img class="icon" src="icons/icon128.png" alt="Extension Icon" style="width: 22px; height: 22px;">
    <h2>信息</h2>
  </div>

  <!--Keyboard shortcut-->
  <div id="empty-state" class="shortcut-container">
    <h3>键盘导航与快捷键</h3>
    <p style="display: flex; align-items: center; margin: 8px 0;">
      <span style="background-color: #0077B6; color: white; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">
        悬停/点击
      </span>
      <span>打开提示词列表按钮</span>
    </p>
    <p style="display: flex; align-items: center; margin: 8px 0;">
      <span style="background-color: #0077B6; color: white; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">
        ⌘ + ⇧ + P 或 Ctrl + M
      </span>
      <span>打开/关闭提示词列表</span>
    </p>
    <p style="display: flex; align-items: center; margin: 8px 0;">
      <span
        style="background-color: #0077B6; color: white; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">↑↓</span>
      <span>导航提示词列表</span>
    </p>
    <p style="display: flex; align-items: center; margin: 8px 0;">
      <span
        style="background-color: #0077B6; color: white; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">Enter</span>
      <span>选择提示词</span>
    </p>
    <p style="display: flex; align-items: center; margin: 8px 0;">
      <span
        style="background-color: #0077B6; color: white; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">Esc</span>
      <span>关闭提示词大师</span>
    </p>
  </div>

  <h3 style="margin-bottom: 2px;">可选权限、热角模式、侧边栏！</h3>
  <p>希望您喜欢！</p>


  <h3 style="margin-bottom: 2px;">功能请求</h3>
  <p>在 <a href="https://gitee.com/ye_sheng0839" target="_blank">Gitee</a> 上联系我</p>

  <!-- Support section: Buy Me a Coffee -->
  <div class="coffee-support"
    style="margin: 18px 0 10px 0; display: flex; justify-content: center; align-items: center;">
    <a href="https://coff.ee/jonathanbertholet" target="_blank" class="coffee-link" style="text-decoration: none;">
      <button class="main coffee-btn"
        style="display: flex; align-items: center; gap: 8px; background-color: #0077B6; color: #fff; font-weight: 500; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.07); font-size: 1rem; transition: background 0.2s;">

        <span>一键三连~</span>

  </div>
  <!-- End Buy Me a Coffee section -->

    /* Make the coffee button look more integrated and add a hover effect */
