<!doctype html>
<html lang="en" data-bs-theme="auto">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Prompt Manager</title>
  <link href="permissions_custom.css" rel="stylesheet">

  <meta name="theme-color" content="#712cf9">

</head>

<body>

  <div class="custom-container custom-my-5">
    <div class="custom-jumbotron">
      <div class="custom-header-center">
        <img src="../icons/icon128.png" alt="Open Prompt Manager Icon" width="48" height="48" class="custom-header-icon" id="header-icon">
        <h1 class="custom-text-emphasis custom-theme-blue">提示词管理器</h1>
      </div>
      <p class="custom-lead-text">
        开源且简单。
      </p>

      <div class="custom-container-mt5 custom-onboarding-section">
        <div class="custom-row">
          <div class="custom-col">
            <img src="../icons/onboarding-start.png" alt="Hover to start" class="custom-onboarding-gif"> <!-- Updated path to onboarding-start.png -->
            <h3 class="custom-onboarding-gif-title">悬停开始</h3>
            <p class="custom-onboarding-caption">
              或查看键盘快捷键。
            </p>
          </div>
          <div class="custom-col">
            <img src="../icons/onboarding-start2.png" alt="探索功能" class="custom-onboarding-gif"> <!-- Updated path to onboarding-start.png -->
            <h3 class="custom-onboarding-gif-title">探索功能</h3>
            <p class="custom-onboarding-caption">热角模式、提示词变量、右键菜单、组织提示词、导出和导入...</p>
          </div>
        </div>
        <!-- COMMENT: Features section (inserted between onboarding row and get-started button) -->
        <section class="custom-features-section" aria-labelledby="features-title">
          <h3 id="features-title" class="custom-features-title">功能特性</h3>
          <!-- COMMENT: Each feature item now includes a subtitle for instant context -->
          <ul class="custom-features-list">
            <!-- COMMENT: Add/remove items to customize the feature list -->
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle clarifies how the quick-launch workflow behaves -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">您的提示词，一键即达</span>
                <span class="custom-feature-subtitle">只需悬停即可开始。</span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle explains the value of granting host permissions -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">在您需要的任何地方可用</span>
                <span class="custom-feature-subtitle">18 个大语言模型、右键菜单、侧边栏。</span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle highlights dynamic placeholder collection -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">高级功能</span>
                <span class="custom-feature-subtitle">提示词变量、标签、搜索、追加提示词、轻松导入。</span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle calls out multi-surface availability -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">键盘快捷键</span>
                <span class="custom-feature-subtitle">键盘快捷键和导航。</span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle reassures users about data portability -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">简洁易用</span>
                <span class="custom-feature-subtitle">用户友好、明暗模式、热角模式。</span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle explains how hot corner activation works -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text">开源</span>
                <span class="custom-feature-subtitle">无需账户，完全隐私。</span>
              </div>
            </li>
          </ul>
        </section>
        <!-- Get Started Button Placeholder -->
        <div id="get-started-btn-container" style="margin-top: 2rem;"></div>
      </div>

      <div class="custom-container-mt5">
        <!-- Collection -->
        <div class="custom-section-border">
          <!-- Title inside the border -->
          <span class="custom-badge-absolute">
            <small class="custom-badge-text">已允许</small>
          </span>

          <!-- Buttons -->
          <div id="permission-granted" class="custom-flex-wrap-group">
          </div>
        </div>
      </div>
      <div class="custom-container-mt5">
        <!-- Collection -->
        <div class="custom-section-border">
          <!-- Title inside the border -->
          <span class="custom-badge-absolute">
            <small class="custom-badge-text">可用</small>
          </span>

          <!-- Buttons -->
          <div id="request-permission" class="custom-flex-wrap-group">
          </div>    
          <!-- COMMENT: Action to revoke all granted optional host permissions and reset pills -->
          <div style="margin-top: 1rem; text-align: center;">
            <button id="remove-all-permissions" class="custom-button" style="padding: 0.5rem 0.9rem;">
              移除所有权限
            </button>
          </div>
        </div>  
      </div>
    </div>
  </div>

  <script type="module" src="permissions.js"></script>

  <!-- Footer Area: Links to GitHub, Chrome Store, and CC License -->
  <footer class="custom-footer">
    <div class="custom-footer-content">
      <!-- Replace the href values with your actual links -->
      <a href="https://github.com/jonathanbertholet/promptmanager" target="_blank" rel="noopener" class="custom-footer-link">GitHub</a>
      &nbsp;|&nbsp;
      <a href="https://chromewebstore.google.com/detail/open-prompt-manager/gmhaghdbihgenofhnmdbglbkbplolain" target="_blank" rel="noopener" class="custom-footer-link">Chrome Store</a>
      &nbsp;|&nbsp;
      <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener" class="custom-footer-link">CC BY 4.0</a>
    </div>
  </footer>

</body>

</html>
